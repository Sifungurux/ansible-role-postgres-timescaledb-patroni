---
# ── Binary installation (etcd removed from both Debian bookworm and EPEL 9) ─────
- name: Create etcd system group
  ansible.builtin.group:
    name: etcd
    system: true

- name: Create etcd system user
  ansible.builtin.user:
    name: etcd
    group: etcd
    system: true
    shell: /usr/sbin/nologin
    home: "{{ etcd_data_dir }}"
    create_home: false

- name: Create etcd data directory
  ansible.builtin.file:
    path: "{{ etcd_data_dir }}"
    state: directory
    owner: etcd
    group: etcd
    mode: "0750"

- name: Download etcd binary archive
  ansible.builtin.get_url:
    url: "https://github.com/etcd-io/etcd/releases/download/v{{ etcd_version }}/etcd-v{{ etcd_version }}-linux-{{ etcd_arch }}.tar.gz"
    dest: "/tmp/etcd-{{ etcd_version }}-linux-{{ etcd_arch }}.tar.gz"
    mode: "0644"

- name: Extract etcd and etcdctl binaries
  ansible.builtin.unarchive:
    src: "/tmp/etcd-{{ etcd_version }}-linux-{{ etcd_arch }}.tar.gz"
    dest: "{{ etcd_install_dir }}"
    remote_src: true
    extra_opts:
      - "--strip-components=1"
      - "--wildcards"
      - "*/etcd"
      - "*/etcdctl"
    creates: "{{ etcd_install_dir }}/etcd"
  notify: Reload systemd

- name: Install etcd systemd service unit
  ansible.builtin.template:
    src: etcd.service.j2
    dest: /etc/systemd/system/etcd.service
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd

# ── Config + start ──────────────────────────────────────────────────────────────
- name: Set etcd advertise address
  ansible.builtin.set_fact:
    _etcd_advertise_address: "{{ ansible_default_ipv4.address | default('127.0.0.1') }}"

# RedHat: config goes in /etc/etcd which must exist before templating.
# Debian: config goes in /etc/default which is always present.
- name: Ensure etcd config directory exists (RedHat)
  ansible.builtin.file:
    path: "{{ etcd_config_path | dirname }}"
    state: directory
    owner: etcd
    group: etcd
    mode: "0750"
  when:
    - ansible_os_family == 'RedHat'

- name: Write etcd environment configuration
  ansible.builtin.template:
    src: etcd.env.j2
    dest: "{{ etcd_config_path }}"
    owner: root
    group: root
    mode: "0644"
  notify: Restart etcd

- name: Flush handlers before starting etcd (daemon-reload must run first)
  ansible.builtin.meta: flush_handlers

- name: Enable and start etcd
  ansible.builtin.service:
    name: "{{ etcd_service_name }}"
    state: started
    enabled: true

- name: Wait for etcd to accept client connections
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ etcd_client_port }}"
    timeout: 30
    delay: 2
