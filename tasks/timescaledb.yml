---
- name: Check Patroni role on this node
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ patroni_restapi_port }}/patroni"
    return_content: true
  register: _patroni_node_info
  failed_when: false
  changed_when: false

- name: Set _is_patroni_primary fact
  ansible.builtin.set_fact:
    _is_patroni_primary: "{{ (_patroni_node_info.json.role | default('')) in ['master', 'primary'] }}"

- name: Configure TimescaleDB (primary only)
  when: _is_patroni_primary
  block:
    - name: Create TimescaleDB extension in postgres database
      community.postgresql.postgresql_ext:
        name: timescaledb
        login_db: postgres
        state: present
        cascade: true
        login_unix_socket: "{{ postgresql_unix_socket_dir }}"
      become: true
      become_user: postgres

    - name: Create application database
      community.postgresql.postgresql_db:
        name: "{{ timescaledb_db_name }}"
        owner: "{{ patroni_superuser_username }}"
        state: present
        login_unix_socket: "{{ postgresql_unix_socket_dir }}"
      become: true
      become_user: postgres
      when: timescaledb_db_name | length > 0

    - name: Create TimescaleDB extension in application database
      community.postgresql.postgresql_ext:
        name: timescaledb
        login_db: "{{ timescaledb_db_name }}"
        state: present
        cascade: true
        login_unix_socket: "{{ postgresql_unix_socket_dir }}"
      become: true
      become_user: postgres
      when: timescaledb_db_name | length > 0

    - name: Create application user
      community.postgresql.postgresql_user:
        user: "{{ timescaledb_app_user }}"
        password: "{{ timescaledb_app_password }}"
        login_db: "{{ timescaledb_db_name }}"
        state: present
        no_password_changes: true
        login_unix_socket: "{{ postgresql_unix_socket_dir }}"
      become: true
      become_user: postgres
      no_log: true
      when:
        - timescaledb_db_name | length > 0
        - timescaledb_app_user | length > 0

    - name: Grant app user privileges on application database
      community.postgresql.postgresql_privs:
        db: "{{ timescaledb_db_name }}"
        privs: ALL
        type: database
        role: "{{ timescaledb_app_user }}"
        state: present
        login_unix_socket: "{{ postgresql_unix_socket_dir }}"
      become: true
      become_user: postgres
      when:
        - timescaledb_db_name | length > 0
        - timescaledb_app_user | length > 0
