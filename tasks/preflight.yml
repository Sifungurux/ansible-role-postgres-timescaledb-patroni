---
- name: Assert supported OS family
  ansible.builtin.assert:
    that:
      - ansible_os_family in ['Debian', 'RedHat']
    fail_msg: "Unsupported OS family: {{ ansible_os_family }}. Role supports Debian and RedHat."

- name: Assert PostgreSQL version is 16 or higher
  ansible.builtin.assert:
    that:
      - postgresql_version | int >= 16
    fail_msg: "postgresql_version must be 16 or higher (got {{ postgresql_version }})."

- name: Assert required passwords are set
  ansible.builtin.assert:
    that:
      - patroni_superuser_password | length > 0
      - patroni_replication_password | length > 0
    fail_msg: "patroni_superuser_password and patroni_replication_password must not be empty."
  no_log: true

- name: Assert cluster group has an odd number of nodes (etcd quorum)
  ansible.builtin.assert:
    that:
      - (groups[patroni_cluster_group] | length) % 2 == 1
    fail_msg: >-
      patroni_cluster_group '{{ patroni_cluster_group }}' has
      {{ groups[patroni_cluster_group] | length }} nodes.
      etcd requires an odd number for quorum (1, 3, 5, …).
  when: patroni_cluster_group | length > 0

- name: Auto-build etcd host list from cluster group
  ansible.builtin.set_fact:
    patroni_etcd_hosts: >-
      {{ groups[patroni_cluster_group]
         | map('extract', hostvars, ['ansible_default_ipv4', 'address'])
         | map('regex_replace', '$', ':' + etcd_client_port | string)
         | list }}
  when: patroni_cluster_group | length > 0
